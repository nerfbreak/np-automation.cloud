name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy NP Automation
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Jakarta

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify Telegram - Deploy Started
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="🚀 *Deploy Dimulai*%0A%0A📦 Repo: \`${{ github.repository }}\`%0A🌿 Branch: \`${{ github.ref_name }}\`%0A💬 Commit: \`${{ github.event.head_commit.message }}\`%0A👤 By: ${{ github.actor }}%0A⏰ $(date '+%d/%m/%Y %H:%M') WIB"

      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/np-automation
            bash deploy.sh
            echo "✅ Deploy selesai: $(date '+%d/%m/%Y %H:%M:%S')"

      - name: Notify Telegram - Deploy Success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="✅ *Deploy Berhasil!*%0A%0A📦 Repo: \`${{ github.repository }}\`%0A🌿 Branch: \`${{ github.ref_name }}\`%0A💬 Commit: \`${{ github.event.head_commit.message }}\`%0A⏰ $(date '+%d/%m/%Y %H:%M') WIB%0A%0A🌐 https://np-automation.cloud"

      - name: Notify Telegram - Deploy Failed
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="❌ *Deploy GAGAL!*%0A%0A📦 Repo: \`${{ github.repository }}\`%0A🌿 Branch: \`${{ github.ref_name }}\`%0A💬 Commit: \`${{ github.event.head_commit.message }}\`%0A⏰ $(date '+%d/%m/%Y %H:%M') WIB%0A%0A🔍 Cek: https://github.com/${{ github.repository }}/actions"
