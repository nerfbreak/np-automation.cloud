name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get GMT+7 Time
        id: time
        run: |
          echo "time=$(TZ='Asia/Jakarta' date +'%d/%m/%Y %H:%M WIB')" >> $GITHUB_OUTPUT

      - name: Send start notification to Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            🚀 *Deploying np-automation...*
            📦 *Repo:* `${{ github.repository }}`
            🌿 *Branch:* `${{ github.ref_name }}`
            💬 *Commit:* `${{ github.event.head_commit.message }}`
            ⏰ *Waktu:* ${{ steps.time.outputs.time }}
            🌐 *URL:* [View Commit](${{ github.event.head_commit.url }})

      - name: SSH Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd /home/rizki/np-automation
            git fetch origin
            git reset --hard origin/master
            npm run build
            pm2 restart ecosystem.config.js
            echo "Deployment completed successfully!"

      - name: Send success notification to Telegram
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ✅ *Deploy Berhasil!*
            📦 *Repo:* `${{ github.repository }}`
            🌿 *Branch:* `${{ github.ref_name }}`
            💬 *Commit:* `${{ github.event.head_commit.message }}`
            ⏰ *Waktu:* ${{ steps.time.outputs.time }}
            🌐 *URL:* https://np-automation.cloud

      - name: Send failure notification to Telegram
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ❌ *Deploy Gagal!*
            📦 *Repo:* `${{ github.repository }}`
            🌿 *Branch:* `${{ github.ref_name }}`
            💬 *Commit:* `${{ github.event.head_commit.message }}`
            ⏰ *Waktu:* ${{ steps.time.outputs.time }}
            Silakan cek log GitHub Actions untuk detail error.


